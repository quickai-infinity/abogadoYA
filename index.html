<script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://prsopicfepfpcplzwgxr.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByc29waWNmZXBmcGNwbHp3Z3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTQ1MDIsImV4cCI6MjA5MDMzMDUwMn0.-0Y_P88_oDkgoD3EQb8109PWlGF7PQsC2RLJ4q5gnAQ';
    
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Hacemos las funciones globales para que los botones HTML puedan llamarlas
    window.submitCiudadano = async function() {
      const nombre = document.getElementById('c-nombre').value.trim();
      const telefono = document.getElementById('c-telefono').value.trim();
      const ciudad = document.getElementById('c-ciudad').value;
      if (!nombre || !telefono) { showToast('Completa nombre y teléfono', true); return; }
      
      const btn = document.getElementById('btn-ciudadano');
      btn.disabled = true; btn.textContent = 'Registrando...';
      
      try {
        const { error } = await supabase.from('preregistros').insert({
          tipo: 'ciudadano', nombre, telefono, ciudad: ciudad || null, fuente: 'landing'
        });
        if (error) throw error;
        
        document.getElementById('form-ciudadano').style.display = 'none';
        document.getElementById('success-ciudadano').style.display = 'block';
        showToast('✅ ¡Registro exitoso!');
      } catch (err) {
        console.error(err);
        showToast('Error al registrar. Intenta de nuevo.', true);
        btn.disabled = false; btn.textContent = '🛡️ Quiero Pre-Registrarme';
      }
    };

    window.submitAbogado = async function() {
      const nombre = document.getElementById('a-nombre').value.trim();
      const telefono = document.getElementById('a-telefono').value.trim();
      const inpre = document.getElementById('a-inpre').value.trim();
      const especialidad = document.getElementById('a-especialidad').value;
      const ciudad = document.getElementById('a-ciudad').value;
      if (!nombre || !telefono) { showToast('Completa nombre y teléfono', true); return; }
      
      const btn = document.getElementById('btn-abogado');
      btn.disabled = true; btn.textContent = 'Registrando...';
      
      try {
        const { error } = await supabase.from('preregistros').insert({
          tipo: 'abogado', nombre, telefono, ciudad: ciudad || null,
          inpreabogado: inpre || null, especialidad: especialidad || null, fuente: 'landing'
        });
        if (error) throw error;
        
        document.getElementById('form-abogado').style.display = 'none';
        document.getElementById('success-abogado').style.display = 'block';
        showToast('✅ ¡Registro exitoso!');
      } catch (err) {
        console.error(err);
        showToast('Error al registrar. Intenta de nuevo.', true);
        btn.disabled = false; btn.textContent = '⚖ Registrarme como Abogado';
      }
    };

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#EF4444' : '#22C55E';
      t.style.color = isError ? '#fff' : '#0A1628';
      t.style.transform = 'translateX(-50%) translateY(0)';
      setTimeout(() => { t.style.transform = 'translateX(-50%) translateY(100px)'; }, 3500);
    }
  </script>
