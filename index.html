<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AbogadoYA — Asistencia Legal de Emergencia 24/7</title>
  <style>
    :root {
      --navy: #0A1628;
      --navy-light: #121F36;
      --navy-mid: #1A2A45;
      --blue-trust: #2563EB;
      --blue-glow: #3B82F6;
      --blue-soft: #60A5FA;
      --red-emergency: #EF4444;
      --red-pulse: #DC2626;
      --orange-alert: #F97316;
      --green-safe: #22C55E;
      --gold: #F59E0B;
      --white: #FFFFFF;
      --gray-100: #F1F5F9;
      --gray-200: #E2E8F0;
      --gray-300: #CBD5E1;
      --gray-400: #94A3B8;
      --gray-500: #64748B;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: sans-serif;
      background: var(--navy);
      color: var(--white);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 100;
      padding: 1rem 1.5rem;
      background: rgba(10, 22, 40, 0.85);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      text-decoration: none;
      font-weight: 800;
      font-size: 1.25rem;
      color: var(--white);
    }
    .logo span { color: var(--red-emergency); }
    .nav-cta {
      background: var(--blue-trust);
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 6rem 1.5rem 4rem;
    }
    .hero h1 {
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 900;
      line-height: 1.1;
      max-width: 700px;
      margin-bottom: 1.5rem;
    }
    .hero-sub {
      font-size: 1.1rem;
      color: var(--gray-400);
      max-width: 500px;
      margin-bottom: 2.5rem;
    }
    .section {
      padding: 5rem 1.5rem;
      max-width: 800px;
      margin: 0 auto;
    }
    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      font-weight: 900;
      margin-bottom: 3rem;
    }
    .form-container {
      background: var(--navy-light);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2rem 1.5rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--gray-300);
      margin-bottom: 0.4rem;
    }
    .form-group input, .form-group select {
      width: 100%;
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: var(--white);
      font-size: 0.9rem;
    }
    .form-group select option { background: var(--navy); }
    .form-submit {
      width: 100%;
      padding: 0.9rem;
      background: var(--blue-trust);
      color: white;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .form-submit.red { background: var(--red-emergency); }
    .tab-switcher {
      display: flex;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 2rem;
    }
    .tab-btn {
      flex: 1;
      padding: 0.75rem;
      background: transparent;
      border: none;
      color: var(--gray-400);
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
    }
    .tab-btn.active {
      background: var(--blue-trust);
      color: white;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="logo">⚖ Abogado<span>YA</span></a>
    <a href="#registro" class="nav-cta">Pre-Registro Gratis</a>
  </nav>

  <section class="hero">
    <h1>Un abogado en tu bolsillo cuando más lo necesitas</h1>
    <p class="hero-sub">Conecta con un abogado en segundos durante encuentros policiales en alcabalas y puntos de control.</p>
  </section>

  <section class="section" id="registro">
    <h2 class="section-title">Pre-Registro</h2>

    <div class="tab-switcher">
      <button class="tab-btn active" onclick="switchTab('ciudadano')">🛡️ Soy Ciudadano</button>
      <button class="tab-btn" onclick="switchTab('abogado')">⚖ Soy Abogado</button>
    </div>

    <div id="tab-ciudadano" class="tab-content active">
      <div class="form-container" id="form-ciudadano">
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" id="c-nombre" placeholder="Tu nombre">
        </div>
        <div class="form-group">
          <label>Teléfono / WhatsApp</label>
          <input type="tel" id="c-telefono" placeholder="+58 4XX XXX XXXX">
        </div>
        <div class="form-group">
          <label>Ciudad</label>
          <select id="c-ciudad">
            <option value="">Selecciona tu ciudad</option>
            <option>Caracas</option>
            <option>Maracaibo</option>
            <option>Valencia</option>
          </select>
        </div>
        <button class="form-submit red" id="btn-ciudadano" onclick="submitCiudadano()">🛡️ Quiero Pre-Registrarme</button>
      </div>
      <div id="success-ciudadano" style="display:none;text-align:center;padding:2rem 1rem;">
        <h3>✅ ¡Registro exitoso!</h3>
      </div>
    </div>

    <div id="tab-abogado" class="tab-content">
      <div class="form-container" id="form-abogado">
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" id="a-nombre" placeholder="Tu nombre">
        </div>
        <div class="form-group">
          <label>Nº de Colegiatura (INPREABOGADO)</label>
          <input type="text" id="a-inpre" placeholder="Ej: 123.456">
        </div>
        <div class="form-group">
          <label>Teléfono / WhatsApp</label>
          <input type="tel" id="a-telefono" placeholder="+58 4XX XXX XXXX">
        </div>
        <button class="form-submit" id="btn-abogado" onclick="submitAbogado()">⚖ Registrarme como Abogado</button>
      </div>
      <div id="success-abogado" style="display:none;text-align:center;padding:2rem 1rem;">
        <h3>✅ ¡Registro exitoso!</h3>
      </div>
    </div>
  </section>

  <div style="position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:#22C55E;color:#0A1628;padding:0.75rem 1.5rem;border-radius:12px;font-weight:700;z-index:10000;transition:transform 0.4s ease;" id="toast"></div>

  <script src="[https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2](https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2)"></script>
  <script>
    const SUPABASE_URL = '[https://prsopicfepfpcplzwgxr.supabase.co](https://prsopicfepfpcplzwgxr.supabase.co)';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByc29waWNmZXBmcGNwbHp3Z3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NTQ1MDIsImV4cCI6MjA5MDMzMDUwMn0.-0Y_P88_oDkgoD3EQb8109PWlGF7PQsC2RLJ4q5gnAQ';
    
    // Se declara la variable UNA sola vez.
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function showToast(msg, isError) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = isError ? '#EF4444' : '#22C55E';
      t.style.transform = 'translateX(-50%) translateY(0)';
      setTimeout(() => { t.style.transform = 'translateX(-50%) translateY(100px)'; }, 3500);
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      if (tab === 'ciudadano') {
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        document.getElementById('tab-ciudadano').classList.add('active');
      } else {
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
        document.getElementById('tab-abogado').classList.add('active');
      }
    }

    async function submitCiudadano() {
      const nombre = document.getElementById('c-nombre').value.trim();
      const telefono = document.getElementById('c-telefono').value.trim();
      if (!nombre || !telefono) { showToast('Completa nombre y teléfono', true); return; }
      const btn = document.getElementById('btn-ciudadano');
      btn.disabled = true; btn.textContent = 'Registrando...';
      
      try {
        const { error } = await supabaseClient.from('preregistros').insert({
          tipo: 'ciudadano', nombre: nombre, telefono: telefono, fuente: 'landing'
        });
        if (error) throw error;
        
        document.getElementById('form-ciudadano').style.display = 'none';
        document.getElementById('success-ciudadano').style.display = 'block';
      } catch (err) {
        showToast('Error al registrar.', true);
        btn.disabled = false; btn.textContent = '🛡️ Quiero Pre-Registrarme';
      }
    }

    async function submitAbogado() {
      const nombre = document.getElementById('a-nombre').value.trim();
      const telefono = document.getElementById('a-telefono').value.trim();
      const inpre = document.getElementById('a-inpre').value.trim();
      if (!nombre || !telefono) { showToast('Completa nombre y teléfono', true); return; }
      const btn = document.getElementById('btn-abogado');
      btn.disabled = true; btn.textContent = 'Registrando...';
      
      try {
        const { error } = await supabaseClient.from('preregistros').insert({
          tipo: 'abogado', nombre: nombre, telefono: telefono, inpreabogado: inpre, fuente: 'landing'
        });
        if (error) throw error;
        
        document.getElementById('form-abogado').style.display = 'none';
        document.getElementById('success-abogado').style.display = 'block';
      } catch (err) {
        showToast('Error al registrar.', true);
        btn.disabled = false; btn.textContent = '⚖ Registrarme como Abogado';
      }
    }
  </script>
</body>
</html>
